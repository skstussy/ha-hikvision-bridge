ptz:
  name: PTZ Move
  description: Move the PTZ camera using PTZCtrlProxy momentary control through the recorder.
  fields:
    channel:
      name: Channel
      description: DVR PTZ channel number
      required: true
      example: 1
    pan:
      name: Pan
      description: Pan speed or direction value
      required: false
      example: 60
    tilt:
      name: Tilt
      description: Tilt speed or direction value
      required: false
      example: 0
    duration:
      name: Duration
      description: Movement duration in milliseconds
      required: false
      example: 500

goto_preset:
  name: Go to preset
  description: Move the PTZ camera to a preset.
  fields:
    channel:
      name: Channel
      description: DVR PTZ channel number
      required: true
      example: 1
    preset:
      name: Preset
      description: Preset number
      required: true
      example: 1

focus:
  name: Focus
  description: Adjust focus using the InputProxy focus endpoint.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1
    direction:
      name: Direction
      description: Use 1 for focus up or -1 for focus down
      required: false
      example: 1
    speed:
      name: Speed
      description: Focus value from 1 to 100
      required: false
      example: 60
    duration:
      name: Duration
      description: Focus drive duration in milliseconds before sending a stop command
      required: false
      example: 350

iris:
  name: Iris
  description: Adjust iris using the InputProxy iris endpoint.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1
    direction:
      name: Direction
      description: Use 1 for iris up or -1 for iris down
      required: false
      example: 1
    speed:
      name: Speed
      description: Iris value from 1 to 100
      required: false
      example: 60
    duration:
      name: Duration
      description: Iris drive duration in milliseconds before sending a stop command
      required: false
      example: 350

ptz_return_to_center:
  name: Return PTZ to home
  description: Move the camera back toward its user-defined home position using tracked relative PTZ counters.
  fields:
    channel:
      name: Channel
      description: DVR PTZ channel number
      required: true
      example: 1
    state:
      name: State
      description: Relative PTZ counter state such as pan, tilt, and zoom
      required: true
      example:
        pan: 2
        tilt: -1
        zoom: 0
    speed:
      name: Speed
      description: PTZ move speed used for each correction step
      required: false
      example: 60
    duration:
      name: Duration
      description: Duration in milliseconds for each correction step
      required: false
      example: 350
    step_delay:
      name: Step delay
      description: Delay in milliseconds between correction steps
      required: false
      example: 150

zoom:
  name: Zoom
  description: Zoom the selected PTZ camera in or out using PTZCtrlProxy momentary control through the recorder.
  fields:
    channel:
      name: Channel
      description: DVR PTZ channel number
      required: true
      example: 1
    direction:
      name: Direction
      description: Use 1 for zoom in and -1 for zoom out
      required: false
      example: 1
    speed:
      name: Speed
      description: Zoom speed from 1 to 100
      required: false
      example: 50
    duration:
      name: Duration
      description: Zoom duration in milliseconds
      required: false
      example: 350

playback_seek:
  name: Start recording playback
  description: Search NVR recordings and start playback from a requested date and time.
  fields:
    entity_id:
      name: Camera entity
      description: Camera entity that should be used for the playback search
      required: true
      example: camera.front_yard
    timestamp:
      name: Requested time
      description: Local date and time to start playback from, for example 2026-04-01T14:05:00
      required: true
      example: "2026-04-01T14:05:00"

playback_stop:
  name: Stop recording playback
  description: Stop recording playback and return the card to the live view.
  fields:
    entity_id:
      name: Camera entity
      description: Camera entity currently in playback mode
      required: true
      example: camera.front_yard

audio_enable:
  name: Enable audio analytics
  description: Enable backend audio analytics for the selected camera channel.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1

audio_disable:
  name: Disable audio analytics
  description: Disable backend audio analytics for the selected camera channel.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1

audio_recalibrate:
  name: Recalibrate audio baseline
  description: Reset the baseline to the current ambient audio conditions.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1

audio_capture_clip:
  name: Capture audio clip
  description: Capture the current buffered audio clip for diagnostics.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1

audio_enable_classifier:
  name: Enable audio classifier
  description: Enable triggered clip classification for the selected camera channel.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1

audio_disable_classifier:
  name: Disable audio classifier
  description: Disable triggered clip classification for the selected camera channel.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1

audio_set_threshold:
  name: Set audio thresholds
  description: Update audio analytics thresholds for the selected camera channel.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1
    abnormal_multiplier:
      name: Abnormal multiplier
      required: false
      example: 2.5
    silence_threshold:
      name: Silence threshold
      required: false
      example: 0.02
    clipping_threshold:
      name: Clipping threshold
      required: false
      example: 0.98
    voice_threshold:
      name: Voice threshold
      required: false
      example: 0.04
    classifier_threshold:
      name: Classifier threshold
      required: false
      example: 0.7

audio_ingest_samples:
  name: Ingest audio samples
  description: Feed real numeric audio samples into the backend analytics pipeline for the selected camera channel.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1
    samples:
      name: Samples
      description: List of PCM-like numeric samples. Values in ranges -1..1, -32768..32767, or 0..255 are accepted.
      required: true
      example:
        - 0.01
        - 0.12
        - 0.95
        - 0.18
    classifier:
      name: Run classifier
      description: Enable classifier processing for this ingest call if the camera classifier is currently disabled.
      required: false
      example: true


audio_start_stream:
  name: Start native audio stream
  description: Start stream-native audio ingestion for a camera using ffmpeg against the camera RTSP path.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1
    profile:
      name: Profile
      description: Stream profile to tap. Use active, main, or sub.
      required: false
      example: active
    ffmpeg_path:
      name: FFmpeg path
      description: ffmpeg binary path available to Home Assistant
      required: false
      example: ffmpeg
    sample_rate:
      name: Sample rate
      description: PCM sample rate requested from ffmpeg
      required: false
      example: 8000
    chunk_size:
      name: Chunk size
      description: PCM bytes read per ingest cycle
      required: false
      example: 3200
    classifier:
      name: Enable classifier
      description: Enable the classifier when starting the stream
      required: false
      example: true

audio_stop_stream:
  name: Stop native audio stream
  description: Stop stream-native audio ingestion for a camera.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1

audio_apply_calibration:
  name: Apply audio calibration preset
  description: Apply a Sentinel calibration preset for the selected camera.
  fields:
    channel:
      name: Channel
      description: Camera channel number
      required: true
      example: 1
    preset:
      name: Preset
      description: Calibration preset. Use quiet, balanced, or noisy.
      required: false
      example: balanced
